<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — NG&J Swift</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            orange:    '#E8520A',
            'orange-lt': '#FF6B2B',
            navy:      '#0F1E33',
            'navy-mid':'#1A2E4A',
            'navy-lt': '#233A5C',
            slate:     '#4A5568',
            silver:    '#8EA0B4',
            mist:      '#F4F1EC',
          },
          fontFamily: {
            sora:  ['Sora', 'sans-serif'],
            bebas: ['"Bebas Neue"', 'cursive'],
          },
          boxShadow: {
            card: '0 20px 60px rgba(15,30,51,0.18)',
            btn:  '0 8px 32px rgba(232,82,10,0.40)',
          },
          keyframes: {
            'fade-up': {
              '0%':   { opacity: '0', transform: 'translateY(24px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            'pulse-ring': {
              '0%, 100%': { boxShadow: '0 0 0 0 rgba(232,82,10,0.35)' },
              '50%':      { boxShadow: '0 0 0 12px rgba(232,82,10,0)' },
            },
            drift: {
              '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
              '33%':      { transform: 'translateY(-18px) rotate(3deg)' },
              '66%':      { transform: 'translateY(10px) rotate(-2deg)' },
            },
          },
          animation: {
            'fade-up':    'fade-up 0.7s ease both',
            'fade-up-d1': 'fade-up 0.7s 0.15s ease both',
            'fade-up-d2': 'fade-up 0.7s 0.30s ease both',
            'pulse-ring': 'pulse-ring 2.4s ease-in-out infinite',
            'drift':      'drift 8s ease-in-out infinite',
            'drift-slow': 'drift 12s 2s ease-in-out infinite',
          },
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Sora', sans-serif; }

    /* Animated background blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
    }

    /* Input focus glow */
    .field-wrap input:focus {
      outline: none;
      border-color: #E8520A;
      box-shadow: 0 0 0 3px rgba(232,82,10,0.18);
    }

    /* Password toggle */
    .eye-btn { cursor: pointer; }

    /* Shake animation for error */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-6px); }
      80%       { transform: translateX(6px); }
    }
    .shake { animation: shake 0.45s ease; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
  </style>
</head>
<body class="min-h-screen bg-navy overflow-hidden flex items-center justify-center relative">

  <!-- Decorative blobs -->
  <div class="blob w-[600px] h-[600px] bg-orange top-[-200px] left-[-200px] animate-drift"></div>
  <div class="blob w-[400px] h-[400px] bg-orange-lt bottom-[-150px] right-[-100px] animate-drift-slow"></div>

  <!-- Subtle grid overlay -->
  <div class="absolute inset-0 opacity-[0.04]"
       style="background-image: linear-gradient(rgba(255,255,255,.6) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.6) 1px,transparent 1px);background-size:40px 40px;"></div>

  <!-- Card -->
  <div class="relative z-10 w-full max-w-md mx-4">

    <!-- Logo block -->
    <div class="text-center mb-8 animate-fade-up">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-orange shadow-btn animate-pulse-ring mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
          <path d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1M5 17a2 2 0 104 0m-4 0a2 2 0 114 0m6 0a2 2 0 104 0m-4 0a2 2 0 114 0"/>
        </svg>
      </div>
      <h1 class="font-bebas text-4xl tracking-widest text-white">
        NG<span class="text-orange">&amp;</span>J SWIFT
      </h1>
      <p class="text-silver text-sm mt-1 tracking-wide">Admin Portal</p>
    </div>

    <!-- Login card -->
    <div class="bg-navy-mid border border-navy-lt rounded-2xl shadow-card p-8 animate-fade-up-d1" id="loginCard">
      <h2 class="text-white font-semibold text-xl mb-1">Welcome back</h2>
      <p class="text-silver text-sm mb-7">Sign in to manage your website content.</p>

      <!-- Error alert -->
      <div id="errorAlert" class="hidden mb-5 flex items-start gap-3 bg-red-500/10 border border-red-500/30 rounded-xl px-4 py-3 text-red-400 text-sm">
        <svg class="w-5 h-5 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="errorMsg">Invalid credentials.</span>
      </div>

      <form id="loginForm" novalidate>

        <!-- Email -->
        <div class="field-wrap mb-5">
          <label class="block text-silver text-xs font-medium uppercase tracking-widest mb-2" for="email">
            Email Address
          </label>
          <div class="relative">
            <span class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-silver">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
            </span>
            <input
              type="email" id="email" name="email"
              required autocomplete="email"
              placeholder="admin@example.com"
              class="w-full bg-navy border border-navy-lt rounded-xl pl-11 pr-4 py-3.5 text-white placeholder-silver/50 text-sm transition-all duration-200"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="field-wrap mb-7">
          <label class="block text-silver text-xs font-medium uppercase tracking-widest mb-2" for="password">
            Password
          </label>
          <div class="relative">
            <span class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-silver">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
              </svg>
            </span>
            <input
              type="password" id="password" name="password"
              required autocomplete="current-password"
              placeholder="••••••••"
              class="w-full bg-navy border border-navy-lt rounded-xl pl-11 pr-12 py-3.5 text-white placeholder-silver/50 text-sm transition-all duration-200"
            />
            <button type="button" id="togglePwd" class="eye-btn absolute inset-y-0 right-4 flex items-center text-silver hover:text-white transition-colors" aria-label="Toggle password visibility">
              <!-- Eye icon (visible state) -->
              <svg id="eyeOpen" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <!-- Eye-off icon (hidden state) -->
              <svg id="eyeOff" class="w-4 h-4 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button
          type="submit" id="submitBtn"
          class="w-full py-4 rounded-xl bg-orange hover:bg-orange-lt text-white font-semibold text-sm tracking-wide shadow-btn transition-all duration-200 hover:-translate-y-0.5 active:translate-y-0 flex items-center justify-center gap-2.5"
        >
          <span id="btnText">Sign In</span>
          <span id="btnSpinner" class="hidden"><span class="spinner"></span></span>
        </button>

      </form>
    </div>

    <!-- Footer -->
    <p class="text-center text-silver/40 text-xs mt-6 animate-fade-up-d2">
      NG&amp;J Swift Haulage &amp; Logistics Limited &copy; <span id="yr"></span>
    </p>

  </div>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();

    // Redirect if already logged in
    if (localStorage.getItem('ngj_token')) {
      window.location.replace('/admin/dashboard');
    }

    // Password toggle
    const pwdInput  = document.getElementById('password');
    const eyeOpen   = document.getElementById('eyeOpen');
    const eyeOff    = document.getElementById('eyeOff');

    document.getElementById('togglePwd').addEventListener('click', () => {
      const isHidden = pwdInput.type === 'password';
      pwdInput.type  = isHidden ? 'text' : 'password';
      eyeOpen.classList.toggle('hidden', isHidden);
      eyeOff.classList.toggle('hidden', !isHidden);
    });

    // Form submission
    const form      = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const btnText   = document.getElementById('btnText');
    const btnSpin   = document.getElementById('btnSpinner');
    const errAlert  = document.getElementById('errorAlert');
    const errMsg    = document.getElementById('errorMsg');
    const card      = document.getElementById('loginCard');

    function showError(msg) {
      errMsg.textContent = msg;
      errAlert.classList.remove('hidden');
      card.classList.add('shake');
      card.addEventListener('animationend', () => card.classList.remove('shake'), { once: true });
    }

    function setLoading(loading) {
      submitBtn.disabled = loading;
      btnText.classList.toggle('hidden', loading);
      btnSpin.classList.toggle('hidden', !loading);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errAlert.classList.add('hidden');

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      setLoading(true);

      try {
        const res  = await fetch('/api/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Invalid credentials. Please try again.');
          return;
        }

        // Store token and admin info
        localStorage.setItem('ngj_token', data.token);
        localStorage.setItem('ngj_admin', JSON.stringify(data.admin));

        // Smooth transition out
        card.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
        card.style.opacity    = '0';
        card.style.transform  = 'translateY(-16px)';

        setTimeout(() => window.location.replace('/admin/dashboard'), 400);

      } catch (err) {
        showError('Unable to connect. Please check your connection.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
